<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="派手電卓">
  <meta name="theme-color" content="#0a0014">
  <meta name="description" content="無駄にエフェクトがド派手な電卓">
  <title>✨ 派手電卓 ✨</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0014' width='100' height='100' rx='20'/><text y='.9em' x='50%' text-anchor='middle' font-size='60'>✨</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="fx-canvas" aria-hidden="true"></canvas>

  <div class="app">
    <header class="header">
      <h1 class="title">
        <span class="title-char">派</span>
        <span class="title-char">手</span>
        <span class="title-char">電</span>
        <span class="title-char">卓</span>
      </h1>
      <p class="subtitle">タップするたびに宇宙が震える</p>
    </header>

    <div class="display-wrap">
      <div class="display-ring"></div>
      <div class="display" id="display" aria-live="polite" aria-label="計算結果">0</div>
      <div class="display-sub" id="display-sub"></div>
    </div>

    <div class="keypad" role="group" aria-label="電卓キー">
      <button class="key key-func" data-action="clear" aria-label="クリア">AC</button>
      <button class="key key-func" data-action="toggle-sign" aria-label="符号反転">±</button>
      <button class="key key-func" data-action="percent" aria-label="パーセント">%</button>
      <button class="key key-op" data-action="operator" data-value="/" aria-label="割る">÷</button>

      <button class="key key-num" data-action="digit" data-value="7">7</button>
      <button class="key key-num" data-action="digit" data-value="8">8</button>
      <button class="key key-num" data-action="digit" data-value="9">9</button>
      <button class="key key-op" data-action="operator" data-value="*" aria-label="かける">×</button>

      <button class="key key-num" data-action="digit" data-value="4">4</button>
      <button class="key key-num" data-action="digit" data-value="5">5</button>
      <button class="key key-num" data-action="digit" data-value="6">6</button>
      <button class="key key-op" data-action="operator" data-value="-" aria-label="引く">−</button>

      <button class="key key-num" data-action="digit" data-value="1">1</button>
      <button class="key key-num" data-action="digit" data-value="2">2</button>
      <button class="key key-num" data-action="digit" data-value="3">3</button>
      <button class="key key-op" data-action="operator" data-value="+" aria-label="足す">+</button>

      <button class="key key-num key-zero" data-action="digit" data-value="0">0</button>
      <button class="key key-num" data-action="decimal" aria-label="小数点">.</button>
      <button class="key key-equals" data-action="equals" aria-label="イコール">=</button>
    </div>
  </div>

  <div class="flash-overlay" id="flash-overlay" aria-hidden="true"></div>

  <script src="js/calculator.js" type="module"></script>
</body>
</html>
