<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="派手電卓">
  <meta name="theme-color" content="#0a0014">
  <title>✨ 派手電卓 ✨</title>
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-deep: #0a0014;
  --neon-pink: #ff006e;
  --neon-cyan: #00f5ff;
  --neon-yellow: #ffbe0b;
  --neon-purple: #8338ec;
  --neon-green: #06ffa5;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

html,
body {
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  font-family: "SF Pro Display", "Hiragino Sans", "Helvetica Neue", sans-serif;
  background: var(--bg-deep);
  color: #fff;
}

#bg-canvas,
#fx-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#bg-canvas {
  z-index: 0;
}

#fx-canvas {
  z-index: 100;
}

.app {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  padding:
    calc(12px + var(--safe-top))
    calc(16px + var(--safe-right))
    calc(16px + var(--safe-bottom))
    calc(16px + var(--safe-left));
}

.header {
  text-align: center;
  margin-bottom: 12px;
}

.title {
  font-size: clamp(1.4rem, 5vw, 1.8rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  background: linear-gradient(
    90deg,
    var(--neon-pink),
    var(--neon-yellow),
    var(--neon-cyan),
    var(--neon-purple),
    var(--neon-pink)
  );
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: title-shimmer 3s linear infinite;
}

.title-char {
  display: inline-block;
  animation: title-bounce 2s ease-in-out infinite;
}

.title-char:nth-child(1) { animation-delay: 0s; }
.title-char:nth-child(2) { animation-delay: 0.15s; }
.title-char:nth-child(3) { animation-delay: 0.3s; }
.title-char:nth-child(4) { animation-delay: 0.45s; }

.subtitle {
  font-size: 0.72rem;
  opacity: 0.6;
  margin-top: 4px;
  letter-spacing: 0.08em;
}

.display-wrap {
  position: relative;
  margin-bottom: 20px;
  flex-shrink: 0;
}

.display-ring {
  position: absolute;
  inset: -4px;
  border-radius: 20px;
  background: conic-gradient(
    from var(--ring-angle, 0deg),
    var(--neon-pink),
    var(--neon-cyan),
    var(--neon-yellow),
    var(--neon-purple),
    var(--neon-green),
    var(--neon-pink)
  );
  animation: ring-spin 4s linear infinite;
  opacity: 0.85;
  filter: blur(1px);
}

.display-ring::after {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 17px;
  background: rgba(10, 0, 20, 0.92);
}

.display {
  position: relative;
  z-index: 1;
  min-height: 88px;
  padding: 20px 24px;
  border-radius: 16px;
  background: rgba(20, 0, 40, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-size: clamp(2.4rem, 10vw, 3.2rem);
  font-weight: 300;
  text-align: right;
  letter-spacing: 0.02em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow:
    0 0 10px var(--neon-cyan),
    0 0 30px rgba(0, 245, 255, 0.4);
  transition: transform 0.1s;
}

.display.glitch {
  animation: display-glitch 0.35s steps(2) 2;
}

.display.shake {
  animation: display-shake 0.4s ease;
}

.display-sub {
  position: relative;
  z-index: 1;
  min-height: 1.2em;
  padding: 4px 24px 0;
  text-align: right;
  font-size: 0.85rem;
  opacity: 0.5;
  letter-spacing: 0.05em;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  flex: 1;
  align-content: end;
}

.key {
  position: relative;
  border: none;
  border-radius: 50%;
  aspect-ratio: 1;
  font-size: clamp(1.3rem, 5vw, 1.6rem);
  font-weight: 500;
  color: #fff;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.08s;
  -webkit-appearance: none;
  appearance: none;
}

.key::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.15s;
}

.key:active {
  transform: scale(0.88);
}

.key-num {
  background: radial-gradient(circle at 30% 30%, #2a1050, #150828);
  box-shadow:
    0 0 15px rgba(131, 56, 236, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.key-num:active {
  box-shadow:
    0 0 30px var(--neon-purple),
    0 0 60px rgba(131, 56, 236, 0.5);
}

.key-func {
  background: radial-gradient(circle at 30% 30%, #3a1545, #1a0820);
  color: var(--neon-pink);
  box-shadow: 0 0 12px rgba(255, 0, 110, 0.25);
  font-size: clamp(1rem, 4vw, 1.2rem);
}

.key-op {
  background: radial-gradient(circle at 30% 30%, #0a3050, #051828);
  color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 245, 255, 0.35);
  font-size: clamp(1.5rem, 6vw, 1.8rem);
}

.key-equals {
  background: radial-gradient(circle at 30% 30%, #ff006e, #8338ec);
  box-shadow:
    0 0 20px rgba(255, 0, 110, 0.6),
    0 0 40px rgba(131, 56, 236, 0.4);
  animation: equals-pulse 2s ease-in-out infinite;
  font-size: clamp(1.5rem, 6vw, 1.8rem);
}

.key-zero {
  grid-column: span 2;
  aspect-ratio: auto;
  border-radius: 999px;
  text-align: left;
  padding-left: 28px;
}

.key.ripple::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
  transform: scale(0);
  animation: ripple 0.5s ease-out;
}

.flash-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, transparent 70%);
  transition: opacity 0.05s;
}

.flash-overlay.active {
  opacity: 1;
}

body.screen-shake {
  animation: screen-shake 0.5s ease;
}

@keyframes title-shimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

@keyframes title-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

@keyframes ring-spin {
  to { --ring-angle: 360deg; }
}

@property --ring-angle {
  syntax: "<angle>";
  initial-value: 0deg;
  inherits: false;
}

@keyframes display-glitch {
  0% { transform: translate(0); filter: hue-rotate(0deg); }
  25% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
  50% { transform: translate(3px, -2px); filter: hue-rotate(180deg); }
  75% { transform: translate(-2px, -1px); filter: hue-rotate(270deg); }
  100% { transform: translate(0); filter: hue-rotate(360deg); }
}

@keyframes display-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

@keyframes equals-pulse {
  0%, 100% {
    box-shadow:
      0 0 20px rgba(255, 0, 110, 0.6),
      0 0 40px rgba(131, 56, 236, 0.4);
  }
  50% {
    box-shadow:
      0 0 35px rgba(255, 0, 110, 0.9),
      0 0 70px rgba(131, 56, 236, 0.7),
      0 0 100px rgba(0, 245, 255, 0.3);
  }
}

@keyframes ripple {
  to { transform: scale(2.5); opacity: 0; }
}

@keyframes screen-shake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-4px, 2px); }
  20% { transform: translate(4px, -2px); }
  30% { transform: translate(-3px, -3px); }
  40% { transform: translate(3px, 3px); }
  50% { transform: translate(-2px, 1px); }
  60% { transform: translate(2px, -1px); }
  70% { transform: translate(-1px, 2px); }
  80% { transform: translate(1px, -2px); }
}

@media (max-height: 680px) {
  .header { margin-bottom: 8px; }
  .display { min-height: 72px; padding: 14px 20px; }
  .keypad { gap: 8px; }
}

  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <div class="app">
    <header class="header">
      <h1 class="title">
        <span class="title-char">派</span><span class="title-char">手</span><span class="title-char">電</span><span class="title-char">卓</span>
      </h1>
      <p class="subtitle">タップするたびに宇宙が震える</p>
    </header>
    <div class="display-wrap">
      <div class="display-ring"></div>
      <div class="display" id="display" aria-live="polite">0</div>
      <div class="display-sub" id="display-sub"></div>
    </div>
    <div class="keypad">
      <button class="key key-func" data-action="clear">AC</button>
      <button class="key key-func" data-action="toggle-sign">±</button>
      <button class="key key-func" data-action="percent">%</button>
      <button class="key key-op" data-action="operator" data-value="/">÷</button>
      <button class="key key-num" data-action="digit" data-value="7">7</button>
      <button class="key key-num" data-action="digit" data-value="8">8</button>
      <button class="key key-num" data-action="digit" data-value="9">9</button>
      <button class="key key-op" data-action="operator" data-value="*">×</button>
      <button class="key key-num" data-action="digit" data-value="4">4</button>
      <button class="key key-num" data-action="digit" data-value="5">5</button>
      <button class="key key-num" data-action="digit" data-value="6">6</button>
      <button class="key key-op" data-action="operator" data-value="-">−</button>
      <button class="key key-num" data-action="digit" data-value="1">1</button>
      <button class="key key-num" data-action="digit" data-value="2">2</button>
      <button class="key key-num" data-action="digit" data-value="3">3</button>
      <button class="key key-op" data-action="operator" data-value="+">+</button>
      <button class="key key-num key-zero" data-action="digit" data-value="0">0</button>
      <button class="key key-num" data-action="decimal">.</button>
      <button class="key key-equals" data-action="equals">=</button>
    </div>
  </div>
  <div class="flash-overlay" id="flash-overlay" aria-hidden="true"></div>
  <script>
// ===== Calculator Logic =====
class FlashyCalculator {
  constructor(displayEl, subDisplayEl) {
    this.displayEl = displayEl;
    this.subDisplayEl = subDisplayEl;
    this.current = "0";
    this.previous = null;
    this.operator = null;
    this.waitingForOperand = false;
    this.lastExpression = "";
  }

  inputDigit(digit) {
    if (this.waitingForOperand) {
      this.current = digit;
      this.waitingForOperand = false;
    } else {
      this.current = this.current === "0" ? digit : this.current + digit;
    }
    this.updateDisplay();
  }

  inputDecimal() {
    if (this.waitingForOperand) {
      this.current = "0.";
      this.waitingForOperand = false;
    } else if (!this.current.includes(".")) {
      this.current += ".";
    }
    this.updateDisplay();
  }

  clear() {
    this.current = "0";
    this.previous = null;
    this.operator = null;
    this.waitingForOperand = false;
    this.lastExpression = "";
    this.updateDisplay();
  }

  toggleSign() {
    if (this.current === "0") return;
    this.current = this.current.startsWith("-")
      ? this.current.slice(1)
      : "-" + this.current;
    this.updateDisplay();
  }

  percent() {
    const val = parseFloat(this.current);
    this.current = String(val / 100);
    this.updateDisplay();
  }

  setOperator(op) {
    const inputValue = parseFloat(this.current);

    if (this.previous === null) {
      this.previous = inputValue;
    } else if (!this.waitingForOperand) {
      const result = this.calculate(this.previous, inputValue, this.operator);
      this.current = this.formatResult(result);
      this.previous = result;
    }

    this.waitingForOperand = true;
    this.operator = op;
    this.lastExpression = `${this.formatResult(this.previous)} ${this.opSymbol(op)}`;
    this.updateDisplay();
  }

  equals() {
    if (this.operator === null || this.previous === null) return null;

    const inputValue = parseFloat(this.current);
    const result = this.calculate(this.previous, inputValue, this.operator);
    this.lastExpression = `${this.formatResult(this.previous)} ${this.opSymbol(this.operator)} ${this.formatResult(inputValue)} =`;
    this.current = this.formatResult(result);
    this.previous = null;
    this.operator = null;
    this.waitingForOperand = true;
    this.updateDisplay();
    return result;
  }

  calculate(a, b, op) {
    switch (op) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? NaN : a / b;
      default: return b;
    }
  }

  opSymbol(op) {
    return { "+": "+", "-": "−", "*": "×", "/": "÷" }[op] || op;
  }

  formatResult(num) {
    if (isNaN(num) || !isFinite(num)) return "エラー";
    const str = String(num);
    if (str.length > 12) {
      return num.toPrecision(10).replace(/\.?0+$/, "");
    }
    return str;
  }

  updateDisplay() {
    this.displayEl.textContent = this.current;
    this.subDisplayEl.textContent = this.lastExpression;
  }
}

// ===== Particle System =====
class ParticleSystem {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.particles = [];
    this.resize();
    window.addEventListener("resize", () => this.resize());
  }

  resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = window.innerWidth * dpr;
    this.canvas.height = window.innerHeight * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.w = window.innerWidth;
    this.h = window.innerHeight;
  }

  burst(x, y, count, colors, intensity = 1) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const speed = (2 + Math.random() * 6) * intensity;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        size: 2 + Math.random() * 4 * intensity,
        color: colors[Math.floor(Math.random() * colors.length)],
        gravity: 0.08,
      });
    }
  }

  confetti(count = 120) {
    const colors = ["#ff006e", "#00f5ff", "#ffbe0b", "#8338ec", "#06ffa5", "#ff006e"];
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: Math.random() * this.w,
        y: -20,
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 6,
        life: 1,
        decay: 0.004 + Math.random() * 0.004,
        size: 4 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        gravity: 0.05,
        rotation: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.2,
      });
    }
  }

  update() {
    this.ctx.clearRect(0, 0, this.w, this.h);

    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.life -= p.decay;
      if (p.spin) p.rotation += p.spin;

      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }

      this.ctx.globalAlpha = p.life;
      this.ctx.fillStyle = p.color;
      this.ctx.shadowBlur = 8;
      this.ctx.shadowColor = p.color;

      if (p.rotation) {
        this.ctx.save();
        this.ctx.translate(p.x, p.y);
        this.ctx.rotate(p.rotation);
        this.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        this.ctx.restore();
      } else {
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        this.ctx.fill();
      }
    }

    this.ctx.globalAlpha = 1;
    this.ctx.shadowBlur = 0;
    requestAnimationFrame(() => this.update());
  }
}

// ===== Starfield Background =====
class Starfield {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.stars = [];
    this.resize();
    window.addEventListener("resize", () => this.resize());
    this.initStars();
  }

  resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = window.innerWidth * dpr;
    this.canvas.height = window.innerHeight * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.w = window.innerWidth;
    this.h = window.innerHeight;
  }

  initStars() {
    this.stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * this.w,
      y: Math.random() * this.h,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      hue: Math.random() * 60 + 260,
      twinkle: Math.random() * Math.PI * 2,
    }));
  }

  draw() {
    this.ctx.fillStyle = "rgba(10, 0, 20, 0.25)";
    this.ctx.fillRect(0, 0, this.w, this.h);

    const t = Date.now() * 0.001;
    for (const s of this.stars) {
      s.y -= s.speed;
      if (s.y < 0) {
        s.y = this.h;
        s.x = Math.random() * this.w;
      }
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(t * 2 + s.twinkle));
      this.ctx.fillStyle = `hsla(${s.hue}, 80%, 70%, ${alpha})`;
      this.ctx.shadowBlur = 4;
      this.ctx.shadowColor = `hsl(${s.hue}, 80%, 70%)`;
      this.ctx.beginPath();
      this.ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      this.ctx.fill();
    }
    this.ctx.shadowBlur = 0;
    requestAnimationFrame(() => this.draw());
  }
}

// ===== Sound Engine (Web Audio) =====
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.enabled = false;
  }

  init() {
    if (this.enabled) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.enabled = true;
    } catch {
      /* silent fail */
    }
  }

  play(type) {
    if (!this.enabled || !this.ctx) return;
    if (this.ctx.state === "suspended") this.ctx.resume();

    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);

    const now = this.ctx.currentTime;

    switch (type) {
      case "digit":
        osc.type = "sine";
        osc.frequency.setValueAtTime(440 + Math.random() * 200, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
        break;
      case "op":
        osc.type = "square";
        osc.frequency.setValueAtTime(660, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
        break;
      case "equals":
        [523, 659, 784, 1047].forEach((freq, i) => {
          const o = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          o.connect(g);
          g.connect(this.ctx.destination);
          o.type = "sawtooth";
          o.frequency.setValueAtTime(freq, now + i * 0.08);
          g.gain.setValueAtTime(0.12, now + i * 0.08);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
          o.start(now + i * 0.08);
          o.stop(now + i * 0.08 + 0.3);
        });
        break;
      case "clear":
        osc.type = "triangle";
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(220, now + 0.2);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
        break;
      case "error":
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.setValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
        break;
    }
  }
}

// ===== Haptic Feedback =====
function vibrate(pattern) {
  if ("vibrate" in navigator) {
    navigator.vibrate(pattern);
  }
}

// ===== Main =====
const displayEl = document.getElementById("display");
const subDisplayEl = document.getElementById("display-sub");
const flashOverlay = document.getElementById("flash-overlay");
const calc = new FlashyCalculator(displayEl, subDisplayEl);
const particles = new ParticleSystem(document.getElementById("fx-canvas"));
const starfield = new Starfield(document.getElementById("bg-canvas"));
const sound = new SoundEngine();

particles.update();
starfield.draw();

const COLORS = {
  digit: ["#8338ec", "#ff006e", "#00f5ff"],
  op: ["#00f5ff", "#06ffa5"],
  func: ["#ff006e", "#ffbe0b"],
  equals: ["#ff006e", "#ffbe0b", "#00f5ff", "#8338ec", "#06ffa5"],
};

function getButtonCenter(btn) {
  const rect = btn.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function triggerFlash() {
  flashOverlay.classList.add("active");
  setTimeout(() => flashOverlay.classList.remove("active"), 80);
}

function triggerShake() {
  document.body.classList.add("screen-shake");
  displayEl.classList.add("shake");
  setTimeout(() => {
    document.body.classList.remove("screen-shake");
    displayEl.classList.remove("shake");
  }, 500);
}

function triggerGlitch() {
  displayEl.classList.remove("glitch");
  void displayEl.offsetWidth;
  displayEl.classList.add("glitch");
  setTimeout(() => displayEl.classList.remove("glitch"), 400);
}

function addRipple(btn) {
  btn.classList.remove("ripple");
  void btn.offsetWidth;
  btn.classList.add("ripple");
}

document.querySelector(".keypad").addEventListener("click", (e) => {
  const btn = e.target.closest(".key");
  if (!btn) return;

  sound.init();

  const action = btn.dataset.action;
  const value = btn.dataset.value;
  const { x, y } = getButtonCenter(btn);

  addRipple(btn);
  triggerGlitch();

  switch (action) {
    case "digit":
      calc.inputDigit(value);
      particles.burst(x, y, 12, COLORS.digit);
      sound.play("digit");
      vibrate(10);
      break;
    case "decimal":
      calc.inputDecimal();
      particles.burst(x, y, 8, COLORS.digit);
      sound.play("digit");
      vibrate(10);
      break;
    case "operator":
      calc.setOperator(value);
      particles.burst(x, y, 20, COLORS.op, 1.2);
      sound.play("op");
      vibrate(20);
      break;
    case "clear":
      calc.clear();
      particles.burst(x, y, 30, COLORS.func, 1.5);
      sound.play("clear");
      vibrate([30, 20, 30]);
      break;
    case "toggle-sign":
      calc.toggleSign();
      particles.burst(x, y, 15, COLORS.func);
      sound.play("op");
      vibrate(15);
      break;
    case "percent":
      calc.percent();
      particles.burst(x, y, 15, COLORS.func);
      sound.play("op");
      vibrate(15);
      break;
    case "equals": {
      const result = calc.equals();
      particles.burst(x, y, 40, COLORS.equals, 2);
      particles.confetti(150);
      triggerFlash();
      triggerShake();
      sound.play("equals");
      vibrate([50, 30, 80, 30, 120]);

      if (result !== null && (isNaN(result) || !isFinite(result))) {
        sound.play("error");
        displayEl.style.color = "#ff006e";
        setTimeout(() => { displayEl.style.color = ""; }, 600);
      }
      break;
    }
  }
});

// Prevent double-tap zoom on iOS
let lastTouchEnd = 0;
document.addEventListener("touchend", (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Prevent pull-to-refresh on iOS
document.body.addEventListener("touchmove", (e) => {
  if (e.target === document.body) e.preventDefault();
}, { passive: false });

  </script>
</body>
